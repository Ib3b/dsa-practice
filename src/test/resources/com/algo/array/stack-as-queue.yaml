algorithm: stack-as-queue
type: com.algo.array.StackAsQueueCase
description: "用两个栈实现队列 — 先执行 ops 完成设置，再执行 queryOp 获取结果"
columns:
  inputs:
    ops: String[]
    args: int[][]
    queryOp: String
    queryArg: int[]
  expected: int
cases:
  # === Basic FIFO ===
  - [[push, push],       [[1],[2]],          pop,   [], 1]
  - [[push, push],       [[1],[2]],          peek,  [], 1]

  # === empty() ===
  - [[],                 [],                 empty, [], 1]
  - [[push],             [[1]],              empty, [], 0]
  - [[push, pop],        [[1],[]],           empty, [], 1]

  # === Order preservation (interleaved) ===
  - [[push, pop, push],                    [[1],[],[2]],            pop,  [], 2]
  - [[push, push, pop, pop, push],         [[1],[2],[],[],[3]],    pop,  [], 3]

  # === Lazy transfer (transfer only when head is empty) ===
  - [[push, push, push, pop],              [[1],[2],[3],[]],       pop,  [], 2]
  - [[push, push, push, pop, pop],         [[1],[2],[3],[],[]],    pop,  [], 3]

  # === Peek doesn't remove ===
  - [[push, push, peek],                   [[1],[2],[]],           pop,  [], 1]

  # === Mixed sequence ===
  - [[push, push, pop, push, pop],         [[1],[2],[],[3],[]],    pop,  [], 3]
  - [[push, push, pop, push, pop, pop],    [[1],[2],[],[3],[],[]], empty, [], 1]
