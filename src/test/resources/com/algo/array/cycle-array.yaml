algorithm: cycle-array
type: com.algo.array.CycleArrayCase
description: "环形数组 — 先执行一组 ops 完成设置，再执行 queryOp 读取结果"
columns:
  inputs:
    capacity: int
    ops: String[]
    args: int[][]
    queryOp: String
    queryArg: int[]
  expected: int
cases:
  # === addLast / addFirst + get ===
  - [3, [addLast, addLast],             [[10],[20]],               get,  [0], 10]
  - [3, [addLast, addLast],             [[10],[20]],               get,  [1], 20]
  - [3, [addFirst, addFirst, addFirst], [[3],[2],[1]],             get,  [1], 2]
  - [3, [addLast, addFirst, addLast],   [[2],[1],[3]],             get,  [0], 1]
  - [3, [addLast, addFirst, addLast],   [[2],[1],[3]],             get,  [1], 2]
  - [3, [addLast, addFirst, addLast],   [[2],[1],[3]],             get,  [2], 3]

  # === removeFirst / removeLast ===
  - [3, [addLast, addLast, addLast, removeFirst], [[1],[2],[3],[]], removeFirst, [], 2]
  - [3, [addLast, addLast, addLast, removeLast],  [[1],[2],[3],[]], removeLast,  [], 2]
  - [2, [addLast, addLast, removeFirst],           [[1],[2],[]],    isEmpty,    [], 0]
  - [2, [addLast, removeFirst],                    [[1],[]],        isEmpty,    [], 1]

  # === wrap-around ===
  - [3, [addLast, addLast, addLast, removeFirst, addLast],
         [[1],[2],[3],[],[4]],                       get,          [2], 4]
  - [3, [addLast, addLast, addLast, removeFirst, removeFirst, addLast, addLast],
         [[1],[2],[3],[],[],[5],[6]],                get,          [1], 5]
  - [3, [addLast, addLast, addLast, removeFirst, removeFirst, addLast, addLast],
         [[1],[2],[3],[],[],[5],[6]],                get,          [2], 6]

  # === set + get ===
  - [3, [addLast, addLast, addLast, set], [[1],[2],[3],[1,99]], get, [1], 99]
  - [3, [addLast, addLast, addLast, set], [[1],[2],[3],[0,88]], get, [0], 88]

  # === size ===
  - [3, [addLast, addLast],       [[1],[2]],        size,   [], 2]
  - [3, [],                       [],                size,   [], 0]
  - [3, [addLast, addLast, addLast, removeFirst],
         [[1],[2],[3],[]],                          size,   [], 2]

  # === isEmpty === (0=false, 1=true)
  - [2, [],                       [],                isEmpty, [], 1]
  - [2, [addLast],                [[1]],             isEmpty, [], 0]

  # === isFull ===
  - [2, [addLast, addLast],       [[1],[2]],         isFull,  [], 1]
  - [2, [addLast],                [[1]],             isFull,  [], 0]
