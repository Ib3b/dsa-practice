algorithm: lru-cache
type: com.algo.linked.list.LRUCacheCase
description: "LRU 缓存 — 先执行 ops 完成设置，再执行 queryOp (get) 检查结果"
columns:
  inputs:
    capacity: int
    ops: String[]
    args: int[][]
    queryOp: String
    queryArg: int[]
  expected: int
cases:
  # === Basic get after put ===
  - [2, [put, put],             [[1,10],[2,20]],                  get, [1], 10]
  - [2, [put, put],             [[1,10],[2,20]],                  get, [2], 20]

  # === Evict when over capacity (LRU key evicted) ===
  - [2, [put, put, put],        [[1,10],[2,20],[3,30]],           get, [1], -1]
  - [2, [put, put, put],        [[1,10],[2,20],[3,30]],           get, [2], 20]

  # === Get refreshes recency — key 1 becomes recent, key 2 evicted ===
  - [2, [put, put, get, put],   [[1,10],[2,20],[1],[3,30]],       get, [2], -1]

  # === Update existing key ===
  - [2, [put, put, put],        [[1,10],[2,20],[1,99]],           get, [1], 99]

  # === Update makes key most recent — key 2 evicted, not key 1 ===
  - [2, [put, put, put, put],   [[1,10],[2,20],[1,99],[3,30]],    get, [2], -1]

  # === Get non-existent key ===
  - [2, [],                     [],                                get, [42], -1]
  - [2, [put],                  [[1,10]],                          get, [2], -1]

  # === Capacity 1 — every put evicts the previous ===
  - [1, [put, put],             [[1,10],[2,20]],                   get, [1], -1]
  - [1, [put, put],             [[1,10],[2,20]],                   get, [2], 20]

  # === Zero is a valid value ===
  - [2, [put],                  [[1,0]],                           get, [1], 0]
